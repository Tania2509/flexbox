<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastFood</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="img/descarga.png" type="image/x-icon">
</head>

<body>
    <nav>
        <img src="img/descarga.png" alt="logo">

        <a href="#">Inicio</a>
        <a href="#">Acerca de nosotros</a>
        <a href="#">Menú</a>
        <a href="#">Contacto</a>
    </nav>

    <!-- DIV para las tarjetas de categorias -->
    <section class="categorias">

        <div class="categoria">
            <img src="img/amburger.jpg" alt="amburger">
            <h3>Hamburguesa</h3>
        </div>

        <div class="categoria">
            <img src="img/hotdog.jpg" alt="perro">
            <h3>Hot Dog</h3>
        </div>

        <div class="categoria">
            <img src="img/burrito.jpg" alt="perro">
            <h3>Burrito</h3>
        </div>

        <div class="categoria">
            <img src="img/papas.jpg" alt="">
            <h3>Papas fritas</h3>
        </div>

        <div class="categoria">
            <img src="img/pizza.jpg" alt="">
            <h3>Pizza</h3>
        </div>

        <div class="categoria">
            <img src="img/pollo.jpg" alt="">
            <h3>Pollo frito</h3>
        </div>

        <div class="categoria">
            <img src="img/salchipapa.jpg" alt="">
            <h3>Salchipapa</h3>
        </div>

        <div class="categoria">
            <img src="img/tacos.jpg" alt="">
            <h3>Tacos</h3>
        </div>

    </section>
</body>

</html>
